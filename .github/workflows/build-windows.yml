name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install Skia
      shell: bash
      run: |
        this_dir=$(cygpath "${{ github.workspace }}")
        skia_url=$(source "$this_dir/laf/misc/skia-url.sh" | xargs)
        skia_file=$(basename "$skia_url")
        curl --ssl-revoke-best-effort -L -o "$skia_file" "$skia_url"
        unzip "$skia_file" -d skia

    - uses: aseprite/get-ninja@main
    - uses: ilammy/msvc-dev-cmd@v1

    - name: Configure
      shell: bash
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DENABLE_TESTS=OFF \
          -DENABLE_SCRIPTING=ON \
          -DENABLE_CCACHE=OFF \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR=$(realpath skia) \
          -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-x64)

    - name: Build
      shell: bash
      run: |
        cmake --build build --config RelWithDebInfo

    - name: Stage install
      shell: bash
      run: |
        cmake --install build --prefix dist --config RelWithDebInfo

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aseprite-windows-relwithdebinfo
        path: dist
        if-no-files-found: error